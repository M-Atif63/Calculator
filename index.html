<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>

<body>
    <center>
        <div class="main">
            <h3 class="output"></h3>
            <input type="text" class="input">
                <ul class="btnsList">
                    <li class="btn grey delete"><i class="fa-solid fa-delete-left"></i></li>
                    <li class="btn grey 7">7</li>
                    <li class="btn grey 4">4</li>
                    <li class="btn grey 1">1</li>
                    <li class="btn grey plusMinus">+/-</li>
                    <li class="btn orange allClear">AC</li>
                    <li class="btn grey 9">8</li>
                    <li class="btn grey 5">5</li>
                    <li class="btn grey 2">2</li>
                    <li class="btn grey 0">0</li>
                    <li class="btn orange percentage">%</li>
                    <li class="btn grey 9">9</li>
                    <li class="btn grey 6">6</li>
                    <li class="btn grey 3">3</li>
                    <li class="btn grey period">.</li>
                    <li class="btn orange divide"><i class="fa-solid fa-divide"></i></li>
                    <li class="btn orange multiply"><i class="fa-solid fa-xmark"></i></li>
                    <li class="btn orange minus"><i class="fa-solid fa-minus"></i></li>
                    <li class="btn orange plus"><i class="fa-solid fa-plus"></i></li>
                    <li class="btn orange equal"><i class="fa-solid fa-equals"></i></li>
                </ul>
        </div>
    </center>
</body>
<script src="app.js"></script>

</html>
