<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>

<body>
    <center>
        <div class="main">
            <p class="output" id="output"></p>
            <input type="text" class="input" id="inputValue" disabled="true">
                <ul class="btnsList">
                    <li class="grey btn" id="delBtn"><i class="fa-solid fa-delete-left"></i></li>
                    <li class="grey btn" id="sevenBtn">7</li>
                    <li class="grey btn" id="fourBtn">4</li>
                    <li class="grey btn" id="oneBtn">1</li>
                    <li class="grey btn" id="plusMinusBtn">+/-</li>
                    <li class="grey btn" id="ACBtn">AC</li>
                    <li class="grey btn" id="eightBtn">8</li>
                    <li class="grey btn" id="fiveBtn">5</li>
                    <li class="grey btn" id="twoBtn">2</li>
                    <li class="grey btn" id="zeroBtn">0</li>
                    <li class="grey btn" id="percentBtn">%</li>
                    <li class="grey btn" id="nineBtn">9</li>
                    <li class="grey btn" id="sixBtn">6</li>
                    <li class="grey btn" id="threeBtn">3</li>
                    <li class="grey btn" id="periodBtn">.</li>
                    <li class="orange btn" id="divideBtn"><i class="fa-solid fa-divide"></i></li>
                    <li class="orange btn" id="multiplyBtn">X</li>
                    <li class="orange btn" id="minusBtn">-</li>
                    <li class="orange btn" id="plusBtn">+</li>
                    <li class="orange btn" id="equalBtn">=</li>
                </ul>
        </div>
    </center>
</body>
<script type="" src="app.js"></script>
</html>
